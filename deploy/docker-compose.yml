name: devlog

# Core: redis, minio, prometheus, grafana.
# Profiles:
#   service  → devlogd containerized (otherwise run it natively: go run ./cmd/devlogd)
#   license  → the mini license server, for license.mode=online
#   ops      → Loki + Alloy, ships the containers' own logs into Grafana

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"] # AOF: hot tier survives restarts
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001" # web console
    volumes:
      - minio-data:/data

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090" # host 9091; 9090 is devlogd's metrics port

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  devlogd:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    profiles: [service]
    command: ["/devlogd", "-config", "/etc/devlog/devlogd.yaml"]
    volumes:
      - ./devlogd.compose.yaml:/etc/devlog/devlogd.yaml:ro
      - ./certs:/etc/devlog/certs:ro
      - ./keys:/etc/devlog/keys:ro
    ports:
      - "8883:8883" # MQTT/TLS
      - "9443:9443" # gRPC/TLS
      - "9090:9090" # metrics/health
    depends_on:
      - redis
      - minio

  licensed:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    profiles: [license]
    entrypoint:
      ["/licensed", "-issuer-pub", "/etc/devlog/keys/issuer.pub",
       "-cert", "/etc/devlog/certs/server.crt", "-key", "/etc/devlog/certs/server.key"]
    volumes:
      - ./certs:/etc/devlog/certs:ro
      - ./keys:/etc/devlog/keys:ro
    ports:
      - "9444:9444"

  loki:
    image: grafana/loki:3.1.1
    profiles: [ops]
    ports:
      - "3100:3100"

  alloy:
    image: grafana/alloy:latest
    profiles: [ops]
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki

volumes:
  redis-data:
  minio-data:
