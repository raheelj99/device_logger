syntax = "proto3";

package devicelog.v1;

import "google/protobuf/timestamp.proto";

option go_package = "devlog/api/gen/devicelog/v1;devicelogv1";

// LogEntry is the wire and storage format for every log record.
// Evolution rules (backward compatibility): 
//   1. Only ADD fields with new numbers,
//   2. Never renumber or change the type of an existing field, 
//   3. Reserve the numbers of removed fields
//   4. Unknown fields are preserved end-to-end.
message LogEntry 
{
  string entry_id = 1;                          // ULID, assigned by the server at ingest
  string device_id = 2;                         // producing station / robot; must match the authenticated MQTT identity
  google.protobuf.Timestamp device_time = 3;    // producer clock
  google.protobuf.Timestamp ingest_time = 4;    // server clock, authoritative for ordering/retention
  Severity severity = 5;
  string subsystem = 6;                         // e.g. "sanitizer", "nav", "vision"
  string message = 7;
  map<string, string> attributes = 8;           // open extension point for arbitrary structured context
  bytes payload = 9;                            // optional opaque blob (sensor dump, tool output)
  uint64 seq = 10;                              // producer-side monotonic sequence per device
  string trace_id = 11;                         // correlation id: sanitization job id / robot mission id
  SanitizationEvent sanitization = 12;          // set only for sanitization domain events

  reserved 13, 14;                              // held for future first-class fields

  Audit audit = 15;                             // filled by the server; producers must leave empty
}

// Audit carries the per-entry tamper-evidence: 
// - A SHA-256 of the canonical entry
// - A link to the previous entry's hash (per-device hash chain)
// - An Ed25519 signature over entry_hash 
// - key_id names the signing key so keys can be rotated without invalidating history
message Audit 
{
  bytes entry_hash = 1;
  bytes prev_hash = 2;
  bytes signature = 3;
  string key_id = 4;
}

enum Severity 
{
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_TRACE = 1;
  SEVERITY_DEBUG = 2;
  SEVERITY_INFO = 3;
  SEVERITY_WARN = 4;
  SEVERITY_ERROR = 5;
  SEVERITY_FATAL = 6;
}

// SanitizationEvent models one step of a media-sanitization job following
// NIST SP 800-88 Rev.1 and IEEE 2883-2022 terminology.
message SanitizationEvent 
{
  TargetMedia media = 1;
  SanitizationStandard standard = 2;
  string technique = 3;        // e.g. "overwrite-1pass", "crypto-erase", "block-erase"
  SanitizationPhase phase = 4;
  double progress_pct = 5;     // meaningful for PROGRESS
  Verification verification = 6;
  string operator_id = 7;
  string error = 8;            // set for FAILED / ABORTED
}

message TargetMedia 
{
  string serial = 1;
  string model = 2;
  uint64 capacity_bytes = 3;
  string media_type = 4;       // e.g. "HDD", "SSD-SATA", "SSD-NVMe", "USB-Flash"
}

message Verification 
{
  string method = 1;           // e.g. "full-read", "sampled-read"
  double sample_pct = 2;
  bool passed = 3;
}

enum SanitizationStandard 
{
  SANITIZATION_STANDARD_UNSPECIFIED = 0;
  SANITIZATION_STANDARD_NIST_800_88_CLEAR = 1;
  SANITIZATION_STANDARD_NIST_800_88_PURGE = 2;
  SANITIZATION_STANDARD_NIST_800_88_DESTROY = 3;
  SANITIZATION_STANDARD_IEEE_2883_CLEAR = 4;
  SANITIZATION_STANDARD_IEEE_2883_PURGE = 5;
  SANITIZATION_STANDARD_IEEE_2883_DESTRUCT = 6;
}

enum SanitizationPhase 
{
  SANITIZATION_PHASE_UNSPECIFIED = 0;
  SANITIZATION_PHASE_STARTED = 1;
  SANITIZATION_PHASE_PROGRESS = 2;
  SANITIZATION_PHASE_VERIFYING = 3;
  SANITIZATION_PHASE_COMPLETED = 4;
  SANITIZATION_PHASE_FAILED = 5;
  SANITIZATION_PHASE_ABORTED = 6;
}
